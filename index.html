<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="manifest" href="manifest.json" />
  <title>Cổng dịch vụ nội bộ - TEST</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef4fb;color:#0f172a}.page{min-height:100vh;padding:16px;display:flex;justify-content:center}.wrap{width:100%;max-width:760px}.hero{background:linear-gradient(135deg,#2563eb,#22c55e);color:#fff;border-radius:26px;padding:24px;box-shadow:0 18px 45px rgba(15,23,42,.15)}.hero h1{margin:0;font-size:26px;line-height:1.2}.hero p{margin:10px 0 0;line-height:1.45;opacity:.95}.card{background:#fff;border-radius:24px;padding:20px;margin-top:16px;box-shadow:0 10px 28px rgba(15,23,42,.1)}h2{margin:0 0 14px;color:#2563eb}label{display:block;margin:12px 0 6px;font-weight:900;font-size:14px}input,select,textarea{width:100%;border:1.5px solid #cbd5e1;border-radius:16px;padding:13px 14px;font-size:16px;outline:none;font-family:Arial,Helvetica,sans-serif}textarea{min-height:90px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}button{border:0;border-radius:16px;background:#2563eb;color:#fff;padding:13px 15px;font-weight:900;font-size:15px;cursor:pointer}button:disabled{background:#94a3b8}.secondary{background:#0f172a}.ghost{background:#e2e8f0;color:#0f172a}.danger{background:#dc2626}.warn{background:#ea580c}.hidden{display:none!important}.row{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr;gap:12px}.two{grid-template-columns:1fr}.msg{display:none;margin-top:14px;border-radius:16px;padding:13px;line-height:1.45;font-weight:700}.msg.ok{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac}.msg.err{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.item{border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin-top:12px;background:#f8fafc}.item h3{margin:0 0 8px}.meta{font-size:14px;color:#475569;line-height:1.55}.pill{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:#e0f2fe;color:#075985}.pill.green{background:#dcfce7;color:#166534}.pill.orange{background:#ffedd5;color:#9a3412}.pill.red{background:#fee2e2;color:#991b1b}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center}.small{font-size:13px;color:#64748b}.empty{text-align:center;color:#64748b;background:#f8fafc;border-radius:18px;padding:18px}.linkbtn{display:inline-block;text-decoration:none;background:#0f172a;color:#fff;border-radius:14px;padding:10px 12px;font-weight:900;margin-top:10px}.steps{border-left:4px solid #e2e8f0;margin:14px 0 0;padding-left:14px}.step{margin:10px 0}.step.done b{color:#166534}.check{display:flex;gap:10px;align-items:flex-start;margin-top:12px}.check input{width:20px;height:20px;flex:0 0 auto}@media(min-width:720px){.two{grid-template-columns:1fr 1fr}.grid.auto{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
  <main class="page"><div class="wrap">
    <section class="hero"><h1>📲 Cổng dịch vụ nội bộ - TEST</h1><p>Đăng ký cấp công lệnh, theo dõi tiến độ và xác nhận đã nhận trên điện thoại.</p></section>

    <section id="loginCard" class="card">
      <h2>Đăng nhập</h2>
      <label>Họ và tên</label><input id="loginName" placeholder="Nhập họ và tên đã đăng ký">
      <label>Mã PIN</label><input id="loginPin" type="password" inputmode="numeric" placeholder="Nhập mã PIN">
      <button id="btnLogin" onclick="login()">ĐĂNG NHẬP</button>
      <div id="loginMsg" class="msg"></div>
    </section>

    <section id="appBox" class="hidden">
      <div class="card topbar">
        <div><b id="helloUser">Xin chào</b><div id="userInfo" class="small"></div></div>
        <div class="row"><button class="ghost" onclick="loadMyRequests()">Tải lại</button><button class="ghost" onclick="logout()">Đăng xuất</button></div>
      </div>

      <section class="card">
        <h2>Gửi yêu cầu cấp công lệnh</h2>
        <div class="grid two">
          <div><label>Đi từ</label><input id="diTu" placeholder="Ví dụ: Trung tâm BTXH Tân Hiệp"></div>
          <div><label>Đến</label><input id="den" placeholder="Ví dụ: Bệnh viện ĐK Bình Phước"></div>
        </div>
        <label>Nội dung công tác</label><textarea id="noiDung" placeholder="Nhập nội dung đi công tác/chuyển viện/nuôi bệnh..."></textarea>
        <div class="grid two">
          <div><label>Ngày đi</label><input id="ngayDi" type="date"></div>
          <div><label>Ngày về</label><input id="ngayVe" type="date"></div>
        </div>
        <label>Phương tiện</label><input id="phuongTien" placeholder="Ví dụ: Xe cơ quan, xe cứu thương, xe cá nhân...">
        <label>Ghi chú thêm</label><textarea id="ghiChu" placeholder="Nội dung cần lưu ý nếu có"></textarea>
        <button id="btnSend" onclick="sendRequest()">GỬI YÊU CẦU</button>
        <div id="newMsg" class="msg"></div>
      </section>

      <section class="card">
        <h2>Hồ sơ của tôi</h2>
        <div id="myList"></div>
      </section>

      <section id="detailCard" class="card hidden"><div id="detailBox"></div></section>
    </section>
  </div></main>

<script>
const API_URL = "DAN_WEB_APP_URL_APPS_SCRIPT_TEST_VAO_DAY";
const API_TOKEN = "DICHVU_NOIBO_TEST_2026";
let currentUser = JSON.parse(localStorage.getItem("dv_user") || "null");
let requests = [];

function esc(s){return String(s||"").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]));}
function showMsg(id,type,html){const el=document.getElementById(id);el.className="msg "+type;el.innerHTML=html;}
function clearMsg(id){const el=document.getElementById(id);el.className="msg";el.innerHTML="";}
function jsonp(params){return new Promise((resolve,reject)=>{if(!API_URL || API_URL.includes("DAN_WEB_APP_URL")){reject(new Error("Chưa cấu hình API_URL trong index.html"));return;}const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*99999);params.set("callback",cb);window[cb]=data=>{delete window[cb];script.remove();resolve(data);};const script=document.createElement("script");script.src=API_URL+"?"+params.toString();script.onerror=()=>{delete window[cb];script.remove();reject(new Error("Không kết nối được Apps Script."));};document.body.appendChild(script);});}
async function api(action, extra={}){const p=new URLSearchParams();p.set("token",API_TOKEN);p.set("action",action);Object.keys(extra).forEach(k=>p.set(k,extra[k]??""));return await jsonp(p);}
function setToday(){const d=new Date();const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");ngayDi.value=s;ngayVe.value=s;}
function init(){setToday();if(currentUser){openApp();}}
function openApp(){document.getElementById("loginCard").classList.add("hidden");document.getElementById("appBox").classList.remove("hidden");helloUser.textContent="Xin chào, "+currentUser.hoTen;userInfo.textContent=(currentUser.chucVu||"")+" - "+(currentUser.phongKhu||"");loadMyRequests();}
async function login(){clearMsg("loginMsg");const hoTen=loginName.value.trim(),pin=loginPin.value.trim();if(!hoTen||!pin){showMsg("loginMsg","err","❌ Vui lòng nhập họ tên và mã PIN.");return;}btnLogin.disabled=true;try{const res=await api("login",{hoTen,pin});if(!res.ok){showMsg("loginMsg","err","❌ "+res.message);return;}currentUser=res.user;localStorage.setItem("dv_user",JSON.stringify(currentUser));openApp();}catch(e){showMsg("loginMsg","err","❌ "+e.message);}finally{btnLogin.disabled=false;}}
function logout(){localStorage.removeItem("dv_user");currentUser=null;location.reload();}
function clearForm(){["diTu","den","noiDung","phuongTien","ghiChu"].forEach(id=>document.getElementById(id).value="");setToday();clearMsg("newMsg");}
async function sendRequest(){clearMsg("newMsg");const data={maNguoiDung:currentUser.maNguoiDung,diTu:diTu.value.trim(),den:den.value.trim(),noiDung:noiDung.value.trim(),ngayDi:ngayDi.value,ngayVe:ngayVe.value,phuongTien:phuongTien.value.trim(),ghiChu:ghiChu.value.trim()};if(!data.diTu||!data.den||!data.noiDung||!data.ngayDi||!data.ngayVe||!data.phuongTien){showMsg("newMsg","err","❌ Vui lòng nhập đủ thông tin bắt buộc.");return;}btnSend.disabled=true;btnSend.textContent="ĐANG GỬI...";try{const res=await api("tao_yeu_cau",data);if(!res.ok){showMsg("newMsg","err","❌ "+res.message);return;}showMsg("newMsg","ok","✅ Đã gửi yêu cầu: <b>"+esc(res.maYeuCau)+"</b><br>Trạng thái: "+esc(res.trangThai));clearForm();await loadMyRequests(false);}catch(e){showMsg("newMsg","err","❌ "+e.message);}finally{btnSend.disabled=false;btnSend.textContent="GỬI YÊU CẦU";}}
async function loadMyRequests(showLoading=true){if(showLoading)myList.innerHTML='<div class="empty">Đang tải hồ sơ...</div>';try{const res=await api("ho_so_cua_toi",{maNguoiDung:currentUser.maNguoiDung});if(!res.ok){myList.innerHTML='<div class="empty">❌ '+esc(res.message)+'</div>';return;}requests=res.data||[];if(!requests.length){myList.innerHTML='<div class="empty">Chưa có yêu cầu nào.</div>';return;}myList.innerHTML=requests.map(renderItem).join("");}catch(e){myList.innerHTML='<div class="empty">❌ '+esc(e.message)+'</div>';}}
function statusPill(st){let c="";if(st.includes("HOÀN TẤT"))c="green";else if(st.includes("TỪ CHỐI"))c="red";else if(st.includes("CẦN")||st.includes("CHỜ"))c="orange";return `<span class="pill ${c}">${esc(st)}</span>`;}
function renderItem(x){return `<div class="item"><div class="topbar"><h3>${esc(x.maYeuCau)}</h3>${statusPill(x.trangThai)}</div><div class="meta"><b>Thời gian gửi:</b> ${esc(x.thoiGianGui)}<br><b>Đi:</b> ${esc(x.diTu)} → ${esc(x.den)}<br><b>Ngày:</b> ${esc(x.ngayDi)} → ${esc(x.ngayVe)}${x.soCongLenh?`<br><b>Số công lệnh:</b> ${esc(x.soCongLenh)}`:""}</div><button class="secondary" onclick="viewDetail('${esc(x.maYeuCau)}')">Xem chi tiết</button></div>`;}
async function viewDetail(ma){detailCard.classList.remove("hidden");detailBox.innerHTML='<div class="empty">Đang tải chi tiết...</div>';try{const res=await api("chi_tiet_yeu_cau",{maYeuCau:ma,maNguoiDung:currentUser.maNguoiDung});if(!res.ok){detailBox.innerHTML='<div class="empty">❌ '+esc(res.message)+'</div>';return;}detailBox.innerHTML=renderDetail(res.data);detailCard.scrollIntoView({behavior:"smooth"});}catch(e){detailBox.innerHTML='<div class="empty">❌ '+esc(e.message)+'</div>';}}
function renderDetail(x){return `<h2>${esc(x.maYeuCau)}</h2>${statusPill(x.trangThai)}<div class="item"><div class="meta"><b>Người đăng ký:</b> ${esc(x.nguoiDangKy)}<br><b>Phòng/Khu:</b> ${esc(x.phongKhu)}<br><b>Đi từ:</b> ${esc(x.diTu)}<br><b>Đến:</b> ${esc(x.den)}<br><b>Nội dung:</b> ${esc(x.noiDung)}<br><b>Ngày đi:</b> ${esc(x.ngayDi)}<br><b>Ngày về:</b> ${esc(x.ngayVe)}<br><b>Phương tiện:</b> ${esc(x.phuongTien)}${x.ghiChuXuLy?`<br><b>Ghi chú xử lý:</b> ${esc(x.ghiChuXuLy)}`:""}</div>${x.linkPDF?`<a class="linkbtn" target="_blank" href="${esc(x.linkPDF)}">Mở PDF công lệnh</a>`:""}</div>${renderSteps(x)}${renderConfirmBox(x)}`;}
function renderSteps(x){const sts=["MỚI GỬI","ĐÃ TIẾP NHẬN","ĐÃ CẤP CÔNG LỆNH","ĐÃ BÀN GIAO - CHỜ XÁC NHẬN","ĐÃ NHẬN - HOÀN TẤT"];let current=sts.indexOf(x.trangThai);if(x.trangThai==="CHỜ NHẬN")current=2;if(x.trangThai==="TỪ CHỐI"||x.trangThai==="CẦN BỔ SUNG")current=1;return `<div class="steps">${sts.map((s,i)=>`<div class="step ${i<=current?'done':''}"><b>${i<=current?'✓':'○'} ${esc(s)}</b></div>`).join("")}</div>`;}
function renderConfirmBox(x){if(!["ĐÃ CẤP CÔNG LỆNH","CHỜ NHẬN","ĐÃ BÀN GIAO - CHỜ XÁC NHẬN"].includes(x.trangThai))return "";return `<div class="item"><h3>Xác nhận đã nhận</h3><label>Người nhận thực tế</label><input id="nguoiNhanThucTe" value="${esc(currentUser.hoTen)}"><label>Lý do nhận thay nếu có</label><textarea id="lyDoNhanThay" placeholder="Nhập nếu người nhận thực tế khác người được cấp"></textarea><div class="check"><input id="dongY" type="checkbox"><span>Tôi xác nhận đã nhận công lệnh nêu trên.</span></div><button onclick="confirmReceived('${esc(x.maYeuCau)}')">TÔI ĐÃ NHẬN</button><div id="confirmMsg" class="msg"></div></div>`;}
async function confirmReceived(ma){clearMsg("confirmMsg");if(!dongY.checked){showMsg("confirmMsg","err","❌ Vui lòng tích xác nhận.");return;}try{const res=await api("xac_nhan_da_nhan",{maYeuCau:ma,maNguoiDung:currentUser.maNguoiDung,nguoiNhanThucTe:nguoiNhanThucTe.value.trim(),lyDoNhanThay:lyDoNhanThay.value.trim()});if(!res.ok){showMsg("confirmMsg","err","❌ "+res.message);return;}showMsg("confirmMsg","ok","✅ "+res.message);await loadMyRequests(false);await viewDetail(ma);}catch(e){showMsg("confirmMsg","err","❌ "+e.message);}}
init();
</script>
</body>
</html>
